[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Integration tests require SIFT_TEST_SERVER to be set; skip them by default.
# Run with: pytest -m integration  (after setting SIFT_TEST_SERVER)
# Run without: pytest -m "not integration"
markers =
    smoke: fast health/sanity tests for local and canary verification
    integration: marks tests that call the live Unraid server (requires SIFT_TEST_SERVER env var)
    e2e: end-to-end browser/UI tests (manual or dedicated pipeline)
    perf: performance benchmark tests (non-default)
    soak: long-running stability tests (non-default)
    slow: expensive tests that are not part of fast verification

addopts = -m "not integration and not e2e and not perf and not soak"
