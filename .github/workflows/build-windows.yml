name: Build Windows exe

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ".[server]" pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --name sift sift/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sift-windows-amd64
          path: dist/sift.exe
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sift.exe

      - name: Prune old releases (keep newest 4)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            })

            const published = releases
              .filter(r => !r.draft)
              .sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at))

            const milestoneRegex = /^v\d+\.\d+\.0$/
            const protectedMilestones = published.filter(r => milestoneRegex.test(r.tag_name || ''))
            const prunable = published.filter(r => !milestoneRegex.test(r.tag_name || ''))

            const keep = 4
            const toDelete = prunable.slice(keep)

            core.info(`Found ${published.length} published releases total.`)
            core.info(`Protected milestone releases (vX.Y.0): ${protectedMilestones.length}`)
            core.info(`Prunable releases: ${prunable.length}; keeping newest ${keep} prunable releases.`)
            const keptPrunable = prunable.slice(0, keep)
            for (const rel of keptPrunable) {
              core.info(`Keeping recent release ${rel.tag_name}`)
            }
            for (const rel of protectedMilestones) {
              core.info(`Keeping milestone release ${rel.tag_name}`)
            }

            for (const rel of toDelete) {
              core.info(`Deleting release ${rel.tag_name} (id=${rel.id})`)
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id })
            }
